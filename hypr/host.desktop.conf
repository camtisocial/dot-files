# Host config: DESKTOP
# Monitor + per-monitor workspace pinning for the desktop (DP-1, 2560x1440@140).
# NOTE: the LG main monitor currently enumerates as DP-1 (it was DP-3 when this
# file was first written -- likely a different DisplayPort on the GPU). If you
# ever move the cable and the screen goes dark, check `hyprctl monitors` for the
# new connector name. For port-independence you could instead match by EDID, e.g.
#   monitor=desc:LG Electronics LG ULTRAGEAR 311NTEP8G484,2560x1440@140,0x0,1
# This file is committed; the active machine selects it via the gitignored
# symlink  hypr/host.conf -> host.desktop.conf

monitor=DP-1,2560x1440@140,0x0,1
# XP-Pen Artist 15.6 Pro drawing tablet, stacked directly below the main monitor.
# scale 0.75 makes its logical size 2560x1440 (1920/0.75 x 1080/0.75), exactly
# matching DP-1's width -> the cursor crosses the FULL bottom edge and its x
# position carries straight down with no dead bands on the sides. pos 0x1440
# aligns the tablet's top-left with DP-1's bottom-left. Trade-off: desktop UI on
# the tablet renders at 2560x1440 and supersamples onto the 1080p panel (crisp,
# but ~25% smaller). For native 1:1 instead, use ,0x1440,1 (re-introduces a
# 320px dead band on each side, since 1920 < 2560).
monitor=HDMI-A-1,1920x1080@60,0x1440,0.75

# Pen mapping: bind the stylus to the tablet's own screen, otherwise its absolute
# coordinates span the whole virtual desktop (both monitors) and the pen lands in
# the wrong place. Device name from `hyprctl devices`.
device {
    name = ugtablet-15.6-inch-pendisplay-stylus
    output = HDMI-A-1
}

workspace=1, monitor:DP-1
workspace=2, monitor:DP-1
workspace=3, monitor:DP-1
workspace=4, monitor:DP-1
workspace=5, monitor:DP-1
workspace=6, monitor:DP-1
workspace=7, monitor:DP-1
workspace=8, monitor:DP-1
workspace=9, monitor:DP-1
# Workspace 10 (Super+0) lives on the tablet. This line was `workspace=0` before,
# which Hyprland ignores -- workspaces are 1-indexed, so it never pinned anything.
workspace=10, monitor:HDMI-A-1

# gsimplecal calendar popup position (top-right, under the waybar clock).
# Absolute px because Hyprland's `move` windowrule rejects % here. Formula:
# x = monitor_width - window_width(378) - 10  ->  2560 - 388 = 2172
windowrule = match:class ^(gsimplecal)$, move 2172 44

# clock-map popup (820px wide):  x = monitor_width - 820 - 10  ->  2560 - 830 = 1730
windowrule = match:class ^(clock-map)$, move 1730 44
