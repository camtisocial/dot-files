# Monitor-agnostic wallpaper: the empty field before the comma = "all outputs",
# so this works on the desktop (DP-3/HDMI) and the laptop (eDP-1) alike.
# ~ expands to your home dir, so it's portable across usernames.
preload = ~/wallpapers/day/ruined_tower.jpg
wallpaper = ,~/wallpapers/day/ruined_tower.jpg
ipc = on
