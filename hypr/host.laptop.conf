# Host config: LAPTOP
# Internal panel is almost always eDP-1. Verify with `hyprctl monitors` and
# change the name here if yours differs.
#   format: monitor=NAME,RESOLUTION,POSITION,SCALE
#   "preferred" = native resolution, "auto" = auto-position, 1 = no scaling
monitor=eDP-1,preferred,auto,1

# Catch-all so any external monitor you plug in just works (mirrors to the right):
# monitor=,preferred,auto,1

# Single monitor -> no workspace pinning needed; all workspaces use eDP-1.

# gsimplecal calendar popup position (top-right, under the waybar clock).
# Absolute px because Hyprland's `move` windowrule rejects % here. Formula:
# x = monitor_width - window_width(378) - 10. The value below assumes a 1920px
# panel (1920 - 388 = 1532); if `hyprctl monitors` shows a different width,
# recompute x accordingly.
windowrule = match:class ^(gsimplecal)$, move 1532 44

# clock-map popup (820px wide): x = monitor_width - 820 - 10. 1920 - 830 = 1090.
# Recompute if `hyprctl monitors` shows a different width.
windowrule = match:class ^(clock-map)$, move 1090 44
