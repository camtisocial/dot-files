# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
# windowrule = tile, class:^(chromium)$, title:Spotify
# windowrule = tile, class:^Chromium$
# windowrule = tile, class:^Chromium$
# --- Per-machine monitor + workspace pinning ---
# The active monitor/workspace config lives in host.conf, which is GITIGNORED
# (each machine has its own). install.sh generates it from one of the templates:
#   host.desktop.conf  (DP-3, 2560x1440@140)
#   host.laptop.conf   (eDP-1)
# Edit those templates, not this block.
source = host.conf
exec-once = hyprctl dispatch workspace 1

###################
### MY PROGRAMS ###
###################
$terminal = kitty
$menu = wofi --show drun --layer-overlay &


#################
### AUTOSTART ###
#################
exec-once = [workspace 1] chromium https://www.spotify.com
# exec-once = [workspace 6] sh -c "sleep 2.0; kitty -e tty-clock -t -s -c -C 1"
# exec-once = [workspace 6] sh -c "sleep 1.5; kitty -e cava"
# greeting via fortune|cowsay removed (those packages are no longer installed)
exec-once = [workspace 1] kitty --title "mainTerminal"
# exec-once = [workspace 1] sh -c "sleep 3.0; chromium;"
# exec-once = sh -c "sleep 3; hyprctl dispatch workspace 1; hyprctl dispatch focuswindow title:mainTerminal"
exec-once = sh -c "sleep 3.0; $HOME/scripts/audio.sh"
exec-once = hyprsunset
exec-once = $HOME/.config/waybar/launch.sh   # wrapper: regenerates the audio dropdown, then starts waybar
# Clipboard history: record every copy (text + images) so Super+G can list it via cliphist+wofi
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# exec-once = hyprpaper
exec-once = sleep 1 && hyprpaper
# exec-once = swaync   # not installed -- dunst is dbus-activated instead
exec-once = hyprpm reload

# Screen sharing (Zoom etc.): xdg-desktop-portal 1.22 added a hard
# Requisite=graphical-session.target, which a bare Hyprland session never
# reaches, so the portal stopped auto-starting and screen share silently did
# nothing. Push the Wayland env into the D-Bus/systemd activation env, then
# launch the portal frontend directly (it pulls in the wlr + gtk backends).
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE
exec-once = /usr/lib/xdg-desktop-portal -r


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = XCURSOR_THEME,SilverXMod
env = XCURSOR_SIZE,40
env = HYPRCURSOR_SIZE,40
env = NVD_BACKEND,direct
env = HYPRSHOT_DIR,~/screenshots/
# Prefer Wayland for Qt apps (e.g. Krita), fall back to xcb/Xwayland if it fails.
# Native Wayland lets Qt render crisply on the fractionally-scaled (0.75) tablet;
# under Xwayland it can only bitmap-scale, which artifacts text. Needs qt6-wayland
# installed (Krita is Qt6) or Qt silently uses the xcb fallback.
env = QT_QPA_PLATFORM,wayland;xcb

cursor {
  no_hardware_cursors = true
}


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
col.inactive_border = rgba(0d0607FF)
col.active_border = rgba(a47329FF) rgba(7cc631FF) 45deg
    gaps_in = 5
    gaps_out = 15

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.2

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]


# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
# dwindle {
#     pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
#     preserve_split = true # You probably want this
# }

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true # No random splash "quote" text on the default background
}



#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################
# 
# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier



# hyprshot
# Screenshot a window
# bind = $mainMod, PRINT, exec, hyprshot -m region 
# Screenshot a monitor
# bind = , PRINT, exec, hyprshot -m window -f ~/screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png
# bind = , PRINT, exec, bash -c "hyprshot -m window -f ~/screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png"

# Screenshot a region
bind = $mainMod, PRINT, exec, hyprshot -m region -f ~/screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png
# Screenshot a region
# bind = $mainMod, PRINT, exec, hyprshot -s -f ~/Pictures/Screenshots/screenshot_$(date +%Y-%m-%d_%H-%M-%S).png
# PRINT, exec, hyprshot -m region 



#swayOsd bindings

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, return, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, F, fullscreen,
bind = $mainMod, B, exec, bash -c "chromium"
# Clipboard history (cliphist) -- reuses the freed-up Super+G slot
bind = $mainMod, G, exec, bash -c "cliphist list | wofi --dmenu | cliphist decode | wl-copy"
# Color picker (hyprpicker) -- pick a pixel, hex copied to clipboard (-a)
bind = $mainMod, C, exec, hyprpicker -a



# Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows with mainMod + SHIFT + hjkl
bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, l, swapwindow, r

# bind = $mainMod, SPACE, hyprtasking:toggle, 'all'
# bind = $mainMod, tab, hyprtasking:toggle, 'cursor'

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        enable_gesture = true # laptop touchpad
        # gesture_fingers = 3  # 3 or 4
        # gesture_distance = 300 # how far is the "max"
        # gesture_positive = true # positive = swipe down. Negative = swipe up.
    }
}

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
# bind = SUPER, grave, hyprexpo:expo, toggle # can be: toggle, off/disable or on/enable

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# move current workspace up or down a monitor
bind = CTRL ALT $mainMod SHIFT, j, movecurrentworkspacetomonitor, l
bind = CTRL ALT $mainMod SHIFT, k, movecurrentworkspacetomonitor, r

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, ~/.config/waybar/osd.sh bright-up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/waybar/osd.sh bright-down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# gsimplecal popup (launched by clicking the waybar clock pills). Strip the
# window chrome so it reads like a panel dropdown, not a managed window:
# no gold border, no shadow, no slide-in animation. Position (monitor-specific,
# absolute px -- move doesn't accept % here) lives in the host.*.conf templates.
windowrule = match:class ^(gsimplecal)$, float on
windowrule = match:class ^(gsimplecal)$, no_anim on
windowrule = match:class ^(gsimplecal)$, no_shadow on
windowrule = match:class ^(gsimplecal)$, border_size 0
windowrule = match:class ^(gsimplecal)$, rounding 8

# clock-map popup (ratatui US time-zone map, launched by clicking the time pill).
# Same chrome-stripping as gsimplecal; size is fixed here, position (monitor-
# specific absolute px) lives in the host.*.conf templates.
windowrule = match:class ^(clock-map)$, float on
windowrule = match:class ^(clock-map)$, no_anim on
windowrule = match:class ^(clock-map)$, no_shadow on
windowrule = match:class ^(clock-map)$, border_size 0
windowrule = match:class ^(clock-map)$, rounding 8
windowrule = match:class ^(clock-map)$, size 820 460

# pwvucontrol volume mixer (opened from the audio module's right-click menu).
# Float + center so it lands predictably on the focused output instead of
# tiling huge and rearranging the layout. Centering also sidesteps the
# wrong-workspace placement seen on the slow first (cold/D-Bus) launch after
# boot: the rule is evaluated at map time, so wherever it ends up it appears
# centered and grabs focus.
windowrule = match:class ^(com.saivert.pwvucontrol)$, float on
windowrule = match:class ^(com.saivert.pwvucontrol)$, center on
windowrule = match:class ^(com.saivert.pwvucontrol)$, size 720 900
windowrule = match:class ^(com.saivert.pwvucontrol)$, rounding 8

# Click-away dismissal for both clock popups. `bindn` is non-consuming: the click
# still reaches the app underneath, but also runs popup-dismiss, which closes
# gsimplecal/clock-map if the click landed outside them. Motion is ignored, so
# this behaves like the volume menu's popup grab (not mouse-leave).
bindn = , mouse:272, exec, $HOME/.config/hypr/popup-dismiss
bindn = , mouse:273, exec, $HOME/.config/hypr/popup-dismiss

# Example windowrule v1
# windowrule = float, ^(kitty)$

# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
# windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

layerrule = blur on, match:namespace wofi
# layerrule = ignore_zero on, match:namespace wofi
layerrule = ignore_alpha 0.2, match:namespace wofi

