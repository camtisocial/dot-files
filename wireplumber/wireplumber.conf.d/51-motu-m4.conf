# MOTU M4 -- pin the "Direct" card profile and prefer it as the default sink.
#
# The card advertises high-priority "HiFi (...)" profiles (priority 8600) whose
# active port is "Headphone + Monitor Out" (Line1). The "Direct" profile we
# actually want is priority 2000, so WirePlumber's auto-profile picks HiFi on
# every plug-in/boot and audio comes out the wrong port. Forcing
# `device.profile = "Direct"` makes the [Out] Direct port the active one.
#
# WirePlumber 0.5 dropped Lua configuration entirely (the old main.lua.d/*.lua
# files are silently ignored -- see the journal warning), so this is the
# SPA-JSON port of those dead rules. The `~` prefix makes the value a regex, so
# this matches the M4 without hard-coding its USB serial number.

monitor.alsa.rules = [
  {
    matches = [
      { device.name = "~alsa_card.usb-MOTU_M4.*" }
    ]
    actions = {
      update-props = {
        device.profile = "Direct"
      }
    }
  }
  {
    matches = [
      { node.name = "~alsa_output.usb-MOTU_M4.*Direct.*sink" }
    ]
    actions = {
      update-props = {
        node.nick = "MOTU M4"
        priority.session = 2000
        priority.driver = 2000
        # don't auto-suspend the interface (avoids a wake-up click/dropout)
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
